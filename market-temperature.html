/* ─────────────────────────────────────────────────────────
   ASSET ALLOCATION ENGINE
───────────────────────────────────────────────────────── */
function calcAssetAllocation(scores) {
  const s = scores;
  const vix=s["vix"]||50, cape=s["cape"]||50, buf=s["buffett"]||50;
  const tnote=s["treasury10y"]||50, yc=s["yield_curve"]||50;
  const fed=s["fedrate"]||50, dxy=s["dxy"]||50, gold=s["gold"]||50;
  const total=(vix+cape+buf+tnote+yc+fed+dxy+gold)/8;
  const highRate=(tnote+fed)/2>60, rateDown=(tnote+fed)/2<40;
  const recessionRisk=yc<40, inflation=(s["wti"]+s["gold"])/2>65;
  const strongDollar=dxy>60;
  let stock=50,bond=25,gold_w=10,cash=10,reit=5;
  if(total>75){stock-=20;bond+=10;gold_w+=5;cash+=10;reit-=5;}
  else if(total>60){stock-=10;bond+=5;cash+=7;reit-=2;}
  else if(total<25){stock+=20;bond-=10;gold_w-=3;cash-=5;reit-=2;}
  else if(total<40){stock+=10;bond-=5;cash-=5;}
  if(highRate){stock-=8;bond-=5;cash+=10;reit-=5;gold_w+=8;}
  if(rateDown){stock+=8;bond+=8;cash-=10;reit+=5;gold_w-=5;}
  if(recessionRisk){stock-=15;bond+=15;gold_w+=5;cash+=5;reit-=10;}
  if(inflation){bond-=10;gold_w+=8;stock-=3;cash+=5;}
  if(strongDollar){gold_w-=3;bond+=3;}
  stock=Math.max(5,stock);bond=Math.max(5,bond);gold_w=Math.max(3,gold_w);cash=Math.max(3,cash);reit=Math.max(0,reit);
  const tw=stock+bond+gold_w+cash+reit, sc=100/tw;
  return {
    stock:Math.round(stock*sc), bond:Math.round(bond*sc),
    gold:Math.round(gold_w*sc), cash:Math.round(cash*sc), reit:Math.round(reit*sc),
    context:{total:Math.round(total),highRate,rateDown,recessionRisk,inflation,strongDollar}
  };
}

/* TLT 점수 계산 */
function calcTLTScore(indicators) {
  const weights = {t10y:20,t30y:20,cpi:20,fedcut:20,unemployment:10,lei:10};
  let total=0, tw=0;
  indicators.forEach(ind=>{
    const w=weights[ind.id]||10;
    total+=ind.tltScore(ind.mockValue)*w;
    tw+=w;
  });
  return Math.round(total/tw);
}

/* ─────────────────────────────────────────────────────────
   BIG GAUGE
───────────────────────────────────────────────────────── */
function BigGauge({score,grade,size="normal"}){
  const R=size==="small"?80:110, stroke=size==="small"?16:22;
  const W=size==="small"?240:320, H=size==="small"?150:195;
  const cx=W/2, cy=size==="small"?120:158;
  const sA=-210,eA=30,arc=eA-sA;
  const p2xy=(a,r)=>({x:cx+r*Math.cos(a*Math.PI/180),y:cy+r*Math.sin(a*Math.PI/180)});
  const arcD=(s,e,r)=>{const sp=p2xy(s,r),ep=p2xy(e,r),lg=Math.abs(e-s)>180?1:0;return `M${sp.x} ${sp.y}A${r} ${r} 0 ${lg} 1 ${ep.x} ${ep.y}`;};
  const fillEnd=sA+arc*score/100;
  const nA=fillEnd,nTip=p2xy(nA,R-stroke/2-6),nB1=p2xy(nA+90,8),nB2=p2xy(nA-90,8);
  const segs=[[sA,sA+arc*0.2,"#00e5b0"],[sA+arc*0.2,sA+arc*0.35,"#4ade80"],[sA+arc*0.35,sA+arc*0.55,"#fbbf24"],[sA+arc*0.55,sA+arc*0.75,"#fb923c"],[sA+arc*0.75,eA,"#f87171"]];
  const segLabels=size==="small"?[]:["BEST","GOOD","NORMAL","BAD","DANGER"];

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
        {/* Track shadow */}
        <path d={arcD(sA,eA,R)} fill="none" stroke="#111122" strokeWidth={stroke+4} strokeLinecap="round"/>
        <path d={arcD(sA,eA,R)} fill="none" stroke="#1c1c2e" strokeWidth={stroke} strokeLinecap="round"/>
        {/* Segment ticks */}
        {segs.map(([s,e,c],i)=>(
          <path key={i} d={arcD(s,e,R)} fill="none" stroke={c} strokeWidth={stroke-5} strokeLinecap="butt" opacity="0.3"/>
        ))}
        {/* Segment dividers */}
        {[0.2,0.35,0.55,0.75].map((frac,i)=>{
          const a=sA+arc*frac;
          const inner=p2xy(a,R-stroke/2-2);
          const outer=p2xy(a,R+stroke/2+2);
          return <line key={i} x1={inner.x} y1={inner.y} x2={outer.x} y2={outer.y} stroke="#07071a" strokeWidth="2.5"/>;
        })}
        {/* Fill arc */}
        <path d={arcD(sA,fillEnd,R)} fill="none" stroke={grade.color} strokeWidth={stroke-5} strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 12px ${grade.color})`}}/>
        {/* Needle */}
        <polygon points={`${nTip.x},${nTip.y} ${nB1.x},${nB1.y} ${nB2.x},${nB2.y}`} fill="white" opacity="0.95"/>
        <circle cx={cx} cy={cy} r={size==="small"?7:10} fill="#0d0d1f" stroke={grade.color} strokeWidth="3"/>
        {/* Segment labels */}
        {size!=="small" && segLabels.map((lbl,i)=>{
          const a=sA+arc*(i*0.2+0.1); const p=p2xy(a,R+28);
          return(
            <text key={i} x={p.x} y={p.y} textAnchor="middle" fill={segs[i][2]}
              fontSize="9" fontFamily="monospace" fontWeight="800" letterSpacing="0.5">{lbl}</text>
          );
        })}
      </svg>
      <div style={{marginTop:size==="small"?"-20px":"-28px",textAlign:"center"}}>
        <div style={{fontSize:size==="small"?"44px":"68px",fontWeight:"900",lineHeight:1,color:grade.color,
          fontFamily:"'Courier New',monospace",textShadow:`0 0 40px ${grade.color}66`}}>{score}</div>
        <div style={{fontSize:"11px",color:"#555",fontFamily:"monospace"}}>/ 100점</div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   RANGE BAR (지표 상세)
───────────────────────────────────────────────────────── */
function RangeBar({ranges,currentValue}){
  const nums=ranges.flatMap(r=>[r.min<=-500?currentValue*0.3:r.min, r.max>=500000?currentValue*1.5:r.max===999?currentValue*1.4:r.max]);
  const minV=Math.min(...nums,currentValue*0.7);
  const maxV=Math.max(...nums,currentValue*1.2);
  const span=maxV-minV;
  const pct=v=>Math.max(0,Math.min(100,((v-minV)/span)*100));
  const curPct=pct(currentValue);
  return(
    <div style={{marginTop:"12px"}}>
      <div style={{position:"relative",height:"20px",borderRadius:"10px",overflow:"hidden",display:"flex"}}>
        {ranges.map((r,i)=>{
          const rMin=r.min<=-500?minV:r.min; const rMax=r.max>=500000?maxV:r.max>=900?currentValue*1.4:r.max;
          const w=Math.max(0,pct(Math.min(rMax,maxV))-pct(Math.max(rMin,minV)));
          return w>0?<div key={i} style={{width:`${w}%`,background:r.color,opacity:0.65}}/>:null;
        })}
        {/* White marker */}
        <div style={{position:"absolute",top:"-2px",bottom:"-2px",left:`calc(${curPct}% - 2px)`,
          width:"4px",background:"white",borderRadius:"2px",boxShadow:"0 0 10px white",zIndex:2}}/>
      </div>
      <div style={{display:"flex",marginTop:"4px"}}>
        {ranges.map((r,i)=>{
          const rMin=r.min<=-500?minV:r.min; const rMax=r.max>=500000?maxV:r.max>=900?currentValue*1.4:r.max;
          const w=Math.max(0,pct(Math.min(rMax,maxV))-pct(Math.max(rMin,minV)));
          return w>1?<div key={i} style={{fontSize:"7.5px",color:r.color,textAlign:"center",flex:w,fontWeight:"700",lineHeight:"1.2"}}>{r.label}</div>:null;
        })}
      </div>
    </div>
  );
}

function TLTMiniChart(){
  // 모의 TLT 가격 & 금리 데이터 (월별 최근 12개)
  const months=["24.6","24.7","24.8","24.9","24.10","24.11","24.12","25.1","25.2","25.3","25.4","25.5"];
  const tltPrices=[88.2,90.1,91.4,95.2,93.8,98.1,94.2,92.8,89.4,87.6,90.2,91.8];
  const rates=[4.40,4.25,3.85,3.78,4.24,4.18,4.58,4.62,4.52,4.20,4.28,4.38];
  const W=340,H=160,padL=36,padR=16,padT=16,padB=28;
  const gW=W-padL-padR, gH=H-padT-padB;
  const minT=Math.min(...tltPrices)-2, maxT=Math.max(...tltPrices)+2;
  const minR=Math.min(...rates)-0.1, maxR=Math.max(...rates)+0.1;
  const tx=i=>padL+i*(gW/(months.length-1));
  const ty=v=>padT+gH-(((v-minT)/(maxT-minT))*gH);
  const ry=v=>padT+gH-(((v-minR)/(maxR-minR))*gH);
  const tPath="M"+tltPrices.map((v,i)=>`${tx(i)},${ty(v)}`).join("L");
  const rPath="M"+rates.map((v,i)=>`${tx(i)},${ry(v)}`).join("L");

  return(
    <div style={{background:"#0a0a18",borderRadius:"10px",padding:"12px",marginBottom:"14px"}}>
      <div style={{fontSize:"10px",color:"#555",marginBottom:"8px"}}>📈 TLT 가격 vs 10년물 금리 (최근 12개월 모의)</div>
      <div style={{display:"flex",gap:"12px",marginBottom:"8px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <div style={{width:"16px",height:"2px",background:"#4ade80"}}/><span style={{fontSize:"9px",color:"#4ade80"}}>TLT 가격</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <div style={{width:"16px",height:"2px",background:"#f87171",borderTop:"2px dashed #f87171"}}/><span style={{fontSize:"9px",color:"#f87171"}}>10년물 금리</span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
        {/* Grid */}
        {[0,0.25,0.5,0.75,1].map(f=>(
          <line key={f} x1={padL} y1={padT+gH*f} x2={W-padR} y2={padT+gH*f} stroke="#1a1a30" strokeWidth="1"/>
        ))}
        {/* TLT area */}
        <path d={tPath+`L${tx(months.length-1)},${padT+gH}L${tx(0)},${padT+gH}Z`} fill="#4ade8012"/>
        <path d={tPath} fill="none" stroke="#4ade80" strokeWidth="2" strokeLinecap="round"/>
        {/* Rate line */}
        <path d={rPath} fill="none" stroke="#f87171" strokeWidth="1.5" strokeDasharray="5,3"/>
        {/* Labels */}
        {months.map((m,i)=>i%3===0&&(
          <text key={i} x={tx(i)} y={H-6} textAnchor="middle" fill="#444" fontSize="8" fontFamily="monospace">{m}</text>
        ))}
        {/* TLT axis (left) */}
        <text x={padL-4} y={padT+4} textAnchor="end" fill="#4ade80" fontSize="8" fontFamily="monospace">{maxT.toFixed(0)}</text>
        <text x={padL-4} y={padT+gH+4} textAnchor="end" fill="#4ade80" fontSize="8" fontFamily="monospace">{minT.toFixed(0)}</text>
        {/* Current dots */}
        <circle cx={tx(months.length-1)} cy={ty(tltPrices[tltPrices.length-1])} r="4" fill="#4ade80"/>
        <circle cx={tx(months.length-1)} cy={ry(rates[rates.length-1])} r="4" fill="#f87171"/>
      </svg>
      <div style={{fontSize:"9px",color:"#333",marginTop:"4px",textAlign:"center"}}>※ 시뮬레이션 데이터 (실제 연동 시 FRED API 사용)</div>
    </div>
  );
}

  return(
    <div style={{background:"#0c0c1e",border:"1.5px solid #6d28d944",borderRadius:"16px",padding:"18px",marginTop:"12px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
        <div>
          <div style={{fontSize:"13px",fontWeight:"900",color:"#a78bfa"}}>🤖 AI 시장 분석</div>
          <div style={{fontSize:"10px",color:"#555",fontFamily:"monospace"}}>자산배분 이유 포함</div>
        </div>
        <button onClick={run} disabled={loading} style={{
          background:loading?"#1a1a2e":"linear-gradient(135deg,#7c3aed,#6d28d9)",
          color:"white",border:"none",borderRadius:"10px",padding:"9px 16px",
          fontSize:"12px",cursor:loading?"not-allowed":"pointer",fontWeight:"700",
          boxShadow:loading?"none":"0 4px 15px #7c3aed44",transition:"all 0.2s",
        }}>{loading?"⏳ 분석 중...":"✨ 분석 시작"}</button>
      </div>
      {text?(
        <div style={{fontSize:"13px",color:"#d4d4f4",lineHeight:"1.85",whiteSpace:"pre-wrap",background:"#0a0a1a",borderRadius:"10px",padding:"14px"}}>{text}</div>
      ):(
        <div style={{fontSize:"12px",color:"#333",textAlign:"center",padding:"20px 0"}}>버튼을 누르면 AI가 자산배분 이유까지 쉽게 설명해드립니다</div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────
   MAIN APP
───────────────────────────────────────────────────────── */
function App(){
  const [scores,setScores]=useState({});
  const [totalScore,setTotal]=useState(0);
  const [tltScore,setTltScore]=useState(0);
  const [alloc,setAlloc]=useState({stock:50,bond:25,gold:10,cash:10,reit:5,context:{}});
  const [expanded,setExpanded]=useState(null);
  const [tab,setTab]=useState("overview");
  const [mounted,setMounted]=useState(false);

  useEffect(()=>{
    const s={};
    INDICATORS.forEach(ind=>{s[ind.id]=ind.scoreCalc(ind.mockValue);});
    setScores(s);
    const totalW=INDICATORS.reduce((a,ind)=>a+ind.weight,0);
    const total=INDICATORS.reduce((sum,ind)=>sum+(s[ind.id]*ind.weight),0);
    setTotal(Math.round(total/totalW));
    setAlloc(calcAssetAllocation(s));
    setTltScore(calcTLTScore(TLT_INDICATORS));
    setTimeout(()=>setMounted(true),100);
  },[]);

  const grade=getGrade(totalScore);
  const sorted=[...INDICATORS].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  const tg=getTLTGrade(tltScore);

  const TABS=[
    {id:"overview",  label:"📊 종합"},
    {id:"allocation",label:"💼 자산배분"},
    {id:"tlt",       label:"📋 TLT"},
    {id:"detail",    label:"🔍 지표"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#07071a",color:"white",
      fontFamily:"'Noto Sans KR','Malgun Gothic',sans-serif",maxWidth:"480px",margin:"0 auto",paddingBottom:"80px"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#0d0d24 0%,#07071a 100%)",borderBottom:"1px solid #1a1a30",
        padding:"16px 20px 12px",position:"sticky",top:0,zIndex:20,backdropFilter:"blur(10px)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:"18px",fontWeight:"900"}}>📈 시장 온도계</div>
            <div style={{fontSize:"10px",color:"#444",marginTop:"2px"}}>
              {new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})} 기준
            </div>
          </div>
          <div style={{display:"flex",gap:"6px"}}>
            <div style={{background:grade.bg,border:`1.5px solid ${grade.color}66`,borderRadius:"10px",padding:"5px 10px",textAlign:"center"}}>
              <div style={{fontSize:"9px",fontWeight:"900",color:grade.color}}>시장 {grade.grade}</div>
              <div style={{fontSize:"13px",fontWeight:"900",color:grade.color,fontFamily:"monospace"}}>{totalScore}점</div>
            </div>
            <div style={{background:tg.bg,border:`1.5px solid ${tg.color}66`,borderRadius:"10px",padding:"5px 10px",textAlign:"center"}}>
              <div style={{fontSize:"9px",fontWeight:"900",color:tg.color}}>TLT {tg.emoji}</div>
              <div style={{fontSize:"13px",fontWeight:"900",color:tg.color,fontFamily:"monospace"}}>{tltScore}점</div>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:"4px",marginTop:"12px"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:"7px 2px",borderRadius:"8px",border:"none",cursor:"pointer",
              fontSize:"10px",fontWeight:"700",
              background:tab===t.id?grade.color:"#1a1a30",
              color:tab===t.id?"#07071a":"#555",transition:"all 0.2s",
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>

        {/* ── OVERVIEW ── */}
        {tab==="overview"&&(<>
          <div style={{background:"#0c0c1e",border:`2px solid ${grade.color}44`,borderRadius:"20px",
            padding:"20px 16px 16px",marginBottom:"14px",textAlign:"center",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:"-60px",left:"50%",transform:"translateX(-50%)",
              width:"300px",height:"300px",borderRadius:"50%",
              background:`radial-gradient(circle,${grade.color}0d 0%,transparent 70%)`,pointerEvents:"none"}}/>
            <BigGauge score={mounted?totalScore:0} grade={grade}/>
            <div style={{marginTop:"10px"}}>
              <div style={{fontSize:"26px",fontWeight:"900",color:grade.color}}>{grade.emoji} {grade.korean}</div>
              <div style={{fontSize:"12px",color:"#888",marginTop:"4px"}}>{grade.sub}</div>
            </div>
            <div style={{marginTop:"14px",background:grade.color+"15",border:`1px solid ${grade.color}33`,borderRadius:"12px",padding:"12px 16px"}}>
              <div style={{fontSize:"13px",color:grade.color,fontWeight:"700",lineHeight:"1.6"}}>{grade.advice}</div>
            </div>
          </div>
          <GradeBar totalScore={totalScore}/>
          <div style={{background:"#0c0c1e",border:"1px solid #1a1a30",borderRadius:"14px",padding:"14px",marginBottom:"14px"}}>
            <div style={{fontSize:"11px",color:"#555",marginBottom:"12px"}}>▎지표별 상태 (위험도 순)</div>
            {sorted.map((ind,i)=>{
              const sc=scores[ind.id]||50; const ig=getIG(sc);
              const isOpp=sc<=25;
              return(
                <div key={ind.id} style={{marginBottom:i<sorted.length-1?"10px":0}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <span style={{fontSize:"11px",color:"#bbb"}}>{ind.icon} {ind.label}</span>
                      {isOpp&&<span style={{fontSize:"8px",color:"#00e5b0",background:"#00e5b022",border:"1px solid #00e5b044",borderRadius:"3px",padding:"1px 4px",fontWeight:"900"}}>🚀 기회</span>}
                    </div>
                    <span style={{fontSize:"10px",fontWeight:"900",color:ig.color,background:ig.color+"22",borderRadius:"4px",padding:"1px 6px"}}>{ig.label}</span>
                  </div>
                  <div style={{position:"relative",height:"6px",background:"#1a1a30",borderRadius:"3px",overflow:"hidden"}}>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${sc}%`,
                      background:`linear-gradient(90deg,#00e5b0,${ig.color})`,borderRadius:"3px",
                      transition:"width 1.4s ease",boxShadow:isOpp?`0 0 8px #00e5b0`:undefined}}/>
                  </div>
                </div>
              );
            })}
          </div>
          <AIPanel scores={scores} totalScore={totalScore} alloc={alloc}/>
        </>)}

        {/* ── ALLOCATION ── */}
        {tab==="allocation"&&<AllocationTab alloc={alloc} grade={grade}/>}

        {/* ── TLT ── */}
        {tab==="tlt"&&<TLTTab tltScore={tltScore}/>}

        {/* ── DETAIL ── */}
        {tab==="detail"&&(
          <div>
            <div style={{fontSize:"11px",color:"#555",marginBottom:"12px",padding:"0 2px"}}>
              위험도 높은 순 · 누르면 적정/위험 수치 + 매수 시그널 확인
            </div>
            {sorted.map((ind,i)=>(
              <IndicatorRow key={ind.id} ind={ind} score={scores[ind.id]||50} rank={i+1}
                expanded={expanded===ind.id} onToggle={()=>setExpanded(expanded===ind.id?null:ind.id)}/>
            ))}
          </div>
        )}
      </div>

      {/* BOTTOM BAR */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:"100%",maxWidth:"480px",background:"#07071aee",borderTop:"1px solid #1a1a30",
        padding:"8px 20px",display:"flex",justifyContent:"space-around",backdropFilter:"blur(10px)"}}>
        {GRADES.map(g=>(
          <div key={g.grade} style={{textAlign:"center"}}>
            <div style={{fontSize:"10px",fontWeight:"900",color:g.color}}>{g.grade}</div>
            <div style={{fontSize:"8px",color:"#444"}}>{["0-20","21-35","36-55","56-75","76+"][GRADES.indexOf(g)]}</div>
          </div>
        ))}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
